name: Backend — Build, Test & Deploy

# Triggers:
#   - Every push to main (no path filter — deploys on any merge to main)
#   - PRs targeting main (only when backend files change)
#   - Manual trigger via GitHub Actions UI ("Run workflow" button)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  workflow_dispatch:   # ← enables the "Run workflow" button in GitHub Actions UI

env:
  DOTNET_VERSION: '9.0.x'          # .NET 9 SDK is required to support the .slnx solution format
  SOLUTION_PATH: 'backend/WeeklyPlanner.slnx'
  PROJECT_PATH: 'backend/WeeklyPlanner.API/WeeklyPlanner.API.csproj'
  PUBLISH_DIR: '${{ github.workspace }}/publish'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test (runs on both push and PR)
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build full solution (Release)
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      # No dedicated test projects exist yet — skipping dotnet test.
      # Add test projects here when ready:
      # - name: Run Tests
      #   run: dotnet test ${{ env.SOLUTION_PATH }} --configuration Release --no-build --verbosity normal

      - name: Publish API artifact
        run: |
          dotnet publish ${{ env.PROJECT_PATH }} \
            --configuration Release \
            --no-build \
            --output ${{ env.PUBLISH_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_DIR }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy (only runs on push to main — not on PRs)
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build-and-test
    # Only deploy when code is merged into main or triggered manually (not during PR checks)
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}
