name: Frontend — Build, Test & Deploy

# Triggers: on every push to main and on PRs targeting main
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test — fast feedback on every push / PR
  # The Azure auto-generated workflow (azure-static-web-apps-jolly-flower-0c7507b00.yml)
  # handles the actual SWA deployment, so we only run tests here.
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Skip when a PR is closed (no point testing a closed PR)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/weekly-planner/package-lock.json

      - name: Install dependencies
        working-directory: frontend/weekly-planner
        run: npm ci

      - name: Run unit tests (no browser)
        working-directory: frontend/weekly-planner
        run: npx ng test --watch=false
