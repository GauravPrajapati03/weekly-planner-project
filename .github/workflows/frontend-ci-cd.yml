name: Frontend — Build, Test & Deploy

# Triggers: on every push to main and on PRs targeting main
on:
  push:
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ main ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci-cd.yml'

jobs:
  # ─────────────────────────────────────────────────────────────────
  # JOB 1: Build & Test (runs on both push and PR)
  # ─────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    # Skip this job when a PR is closed (Azure SWA handles its own cleanup)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/weekly-planner/package-lock.json

      - name: Install dependencies
        working-directory: frontend/weekly-planner
        run: npm ci

      - name: Run unit tests (no browser)
        working-directory: frontend/weekly-planner
        run: npx ng test --watch=false

  # ─────────────────────────────────────────────────────────────────
  # JOB 2: Deploy to Azure Static Web Apps
  # Azure SWA handles PR preview environments automatically.
  # On push to main → deploys to production.
  # On PR close    → removes preview environment.
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Azure Static Web Apps
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request')

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' && 'close' || 'upload' }}
          app_location: 'frontend/weekly-planner'
          output_location: 'dist/weekly-planner/browser'
          app_build_command: 'npm run build -- --configuration production'
